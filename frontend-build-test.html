<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест фронтенда Методика Кофе</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; font-size: 16px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Тест работы фронтенда Методика Кофе</h1>
    
    <h3>1. Тест API:</h3>
    <button onclick="testAPI()">Проверить API</button>
    
    <h3>2. Тест заказа (имитация фронтенда):</h3>
    <button onclick="testOrder()">Отправить тестовый заказ</button>
    
    <h3>3. Проверка CORS:</h3>
    <button onclick="testCORS()">Проверить CORS</button>
    
    <div id="result" style="margin-top: 20px;"></div>
    
    <script>
    const resultDiv = document.getElementById('result');
    
    async function testAPI() {
        try {
            const response = await fetch('/api/test');
            const data = await response.json();
            resultDiv.innerHTML = `<pre>✅ API работает:\n${JSON.stringify(data, null, 2)}</pre>`;
        } catch (error) {
            resultDiv.innerHTML = `<pre>❌ Ошибка API: ${error.message}</pre>`;
        }
    }
    
    async function testOrder() {
        const orderData = {
            userName: "Тест из браузера",
            userPhone: "+79161234567",
            totalAmount: 350,
            items: [
                {name: "Капучино", price: 200, quantity: 1},
                {name: "Круассан", price: 150, quantity: 1}
            ]
        };
        
        try {
            const response = await fetch('/api/orders', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(orderData)
            });
            
            const data = await response.json();
            resultDiv.innerHTML = `<pre>✅ Заказ отправлен:\n${JSON.stringify(data, null, 2)}</pre>`;
        } catch (error) {
            resultDiv.innerHTML = `<pre>❌ Ошибка отправки заказа: ${error.message}</pre>`;
        }
    }
    
    async function testCORS() {
        try {
            const response = await fetch('/api/orders', {
                method: 'OPTIONS',
                headers: {
                    'Origin': 'https://metodika-coffee.ru',
                    'Access-Control-Request-Method': 'POST',
                    'Access-Control-Request-Headers': 'Content-Type'
                }
            });
            
            const corsHeaders = {};
            response.headers.forEach((value, key) => {
                if (key.toLowerCase().includes('access-control')) {
                    corsHeaders[key] = value;
                }
            });
            
            resultDiv.innerHTML = `<pre>✅ CORS заголовки:\n${JSON.stringify(corsHeaders, null, 2)}\nСтатус: ${response.status}</pre>`;
        } catch (error) {
            resultDiv.innerHTML = `<pre>❌ Ошибка CORS: ${error.message}</pre>`;
        }
    }
    </script>
</body>
</html>
