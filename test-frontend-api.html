<!DOCTYPE html>
<html>
<head>
    <title>Тест API фронтенда</title>
</head>
<body>
    <h1>Тест отправки заказа из фронтенда</h1>
    <button onclick="testOrder()">Отправить тестовый заказ</button>
    <div id="result"></div>
    
    <script>
    async function testOrder() {
        const orderData = {
            userName: "Тест из браузера",
            userPhone: "+79161234567",
            totalAmount: 350,
            items: [{name: "Тестовый кофе", price: 350, quantity: 1}]
        };
        
        try {
            // Пробуем разные варианты URL
            const urls = [
                '/api/orders',
                'https://metodika-coffee.ru/api/orders',
                'http://localhost/api/orders',
                'http://localhost:3001/api/orders'
            ];
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Пробуем отправить заказ...</p>';
            
            for (let url of urls) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(orderData)
                    });
                    
                    const data = await response.json();
                    resultDiv.innerHTML += `<p><b>${url}:</b> ${response.status} - ${JSON.stringify(data)}</p>`;
                } catch (err) {
                    resultDiv.innerHTML += `<p><b>${url}:</b> Ошибка: ${err.message}</p>`;
                }
            }
        } catch (error) {
            document.getElementById('result').innerHTML = `Ошибка: ${error.message}`;
        }
    }
    </script>
</body>
</html>
